# HTTPS reverse proxy for Next.js (systemd gdpr.service on 127.0.0.1:3000).
#
# --- Prerequisites ---
# - Route 53 A record: gdpr.synkserver.net -> this instance public IP
# - Security group: inbound TCP 80 and 443 from the internet (0.0.0.0/0 or your clients)
# - On the server .env: AUTH_URL="https://gdpr.synkserver.net"
#   then: sudo systemctl restart gdpr
# - TLS: cert paths below assume Let's Encrypt for gdpr.synkserver.net. If you used another
#   hostname earlier, run certbot again for this FQDN and align ssl_certificate paths.
#
# --- Amazon Linux 2023 (example) ---
#   sudo dnf install -y nginx certbot python3-certbot-nginx
#   sudo systemctl enable --now nginx
#
# --- Stage 1 — HTTP only (first deploy / before certificates) ---
# Copy ONLY the first `server { ... }` block below (listen 80; proxy only, no return 301)
# to e.g. /etc/nginx/conf.d/gdpr.conf , test, reload:
#   sudo nginx -t && sudo systemctl reload nginx
#
# --- Stage 2 — Let's Encrypt ---
#   sudo certbot --nginx -d gdpr.synkserver.net
# Certbot will add TLS to your server block. Then replace the file with this full version
# (or merge: add the second server block and the return 301 on port 80) so HTTP redirects
# to HTTPS. Paths below are the default certbot locations.
#
#   sudo nginx -t && sudo systemctl reload nginx
#
# --- Optional hardening ---
# After nginx works, bind Next only on localhost and drop public :3000 from the SG:
#   ExecStart=... next start -H 127.0.0.1 -p 3000
# in gdpr.service

# -----------------------------------------------------------------------------
# STAGE 1 (temporary): use this single server block, then run certbot --nginx
# -----------------------------------------------------------------------------
# server {
#     listen 80;
#     server_name gdpr.synkserver.net;
#     location / {
#         proxy_pass http://127.0.0.1:3000;
#         proxy_http_version 1.1;
#         proxy_set_header Upgrade $http_upgrade;
#         proxy_set_header Connection "upgrade";
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;
#     }
# }

# -----------------------------------------------------------------------------
# STAGE 2 (production): full file
# -----------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name gdpr.synkserver.net;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gdpr.synkserver.net;

    ssl_certificate     /etc/letsencrypt/live/gdpr.synkserver.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gdpr.synkserver.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
